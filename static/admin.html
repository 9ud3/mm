<!DOCTYPE html>
<html>
<head>
<title>HalalMM Admin</title>
<style>
  body{background:#0a0a0a;color:#f0f0f0;font-family:monospace;padding:32px;margin:0}
  h1{color:#4ade80;margin-bottom:4px}
  .sub{color:#666;margin-bottom:24px;font-size:13px}
  input{background:#111;border:1px solid #333;color:#f0f0f0;padding:8px 12px;border-radius:6px;font-family:monospace;font-size:13px;outline:none}
  input:focus{border-color:#4ade80}
  button{background:#4ade80;color:#000;border:none;padding:8px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px}
  button:hover{background:#86efac}
  button.red{background:#f87171;color:#fff}
  button.red:hover{background:#fca5a5}
  button.gray{background:#222;color:#aaa;border:1px solid #333}
  button.gray:hover{background:#333;color:#fff}
  .toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .tabs{display:flex;gap:4px}
  .tab{padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid #333;background:none;color:#666}
  .tab.active{background:#4ade8022;border-color:#4ade80;color:#4ade80}
  .card{background:#111;border:1px solid #222;border-radius:10px;margin-bottom:10px;overflow:hidden}
  .card-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .card-header:hover{background:#181818}
  .card-title{font-weight:700;font-size:14px}
  .card-meta{color:#666;font-size:12px;margin-top:3px}
  .card-body{padding:16px 18px;display:none;border-top:1px solid #1a1a1a}
  .card-body.open{display:block}
  textarea{width:100%;background:#0d0d0d;border:1px solid #333;color:#4ade80;padding:12px;border-radius:6px;font-family:monospace;font-size:12px;resize:vertical;outline:none;min-height:220px;box-sizing:border-box}
  textarea:focus{border-color:#4ade80}
  .actions{display:flex;gap:8px;margin-top:10px}
  .pill{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
  .pill.funded{background:#4ade8022;color:#4ade80}
  .pill.pending{background:#fbbf2422;color:#fbbf24}
  .pill.released{background:#60a5fa22;color:#60a5fa}
  .pill.disputed{background:#f8717122;color:#f87171}
  #status{padding:10px 16px;background:#111;border:1px solid #333;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
  #status.ok{border-color:#4ade80;color:#4ade80;display:block}
  #status.err{border-color:#f87171;color:#f87171;display:block}
</style>
</head>
<body>
<h1>⚙ HalalMM Admin</h1>
<div class="sub">Manage deals and users. Keep this URL private.</div>

<div class="toolbar">
  <input id="pw" type="password" placeholder="Admin password" />
  <div class="tabs">
    <button class="tab active" onclick="switchTab('deals',this)">Deals</button>
    <button class="tab" onclick="switchTab('users',this)">Users</button>
  </div>
  <button onclick="load()">Load</button>
</div>
<div id="status"></div>
<div id="content"></div>

<script>
let currentTab = 'deals';
let rawData = {};

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function pw() { return document.getElementById('pw').value; }

function showStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = ok ? 'ok' : 'err';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function load() {
  try {
    const res = await fetch('/admin/data', {headers:{'X-Admin-Password': pw()}});
    if (!res.ok) { showStatus('Wrong password or server error', false); return; }
    rawData = await res.json();
    render();
    showStatus('Loaded successfully', true);
  } catch(e) { showStatus('Failed: ' + e.message, false); }
}

function render() {
  const el = document.getElementById('content');
  if (currentTab === 'deals') {
    const deals = rawData.deals || {};
    const keys = Object.keys(deals).reverse();
    if (!keys.length) { el.innerHTML = '<div style="color:#666;padding:20px">No deals found.</div>'; return; }
    el.innerHTML = keys.map(id => {
      const d = deals[id];
      const sc = {FUNDED:'funded',PENDING_FUNDING:'pending',RELEASED:'released',DISPUTED:'disputed',IN_PROGRESS:'funded'}[d.status] || 'pending';
      return `<div class="card">
        <div class="card-header" onclick="toggle('${id}')">
          <div>
            <div class="card-title">${esc(d.title)} <span class="pill ${sc}">${d.status}</span></div>
            <div class="card-meta">${id} &middot; ${d.amount} ${d.currency} &middot; Buyer: ${esc(d.buyer_email)} &middot; ${d.created_at?.slice(0,10)}</div>
          </div>
          <span style="color:#444">&#9660;</span>
        </div>
        <div class="card-body" id="body-${id}">
          <textarea id="ta-${id}">${JSON.stringify(d, null, 2)}</textarea>
          <div class="actions">
            <button onclick="saveDeal('${id}')">Save Changes</button>
            <button class="red" onclick="deleteDeal('${id}')">Delete Deal</button>
            <button class="gray" onclick="toggle('${id}')">Close</button>
          </div>
        </div>
      </div>`;
    }).join('');
  } else {
    const users = rawData.discord_users || {};
    const keys = Object.keys(users);
    if (!keys.length) { el.innerHTML = '<div style="color:#666;padding:20px">No users found.</div>'; return; }
    el.innerHTML = keys.map(id => {
      const u = users[id];
      return `<div class="card">
        <div class="card-header" onclick="toggle('u-${id}')">
          <div>
            <div class="card-title">@${esc(u.discord_username)}</div>
            <div class="card-meta">${id} &middot; ${u.email || 'no email'} &middot; joined ${u.joined_at?.slice(0,10)}</div>
          </div>
          <span style="color:#444">&#9660;</span>
        </div>
        <div class="card-body" id="body-u-${id}">
          <textarea id="ta-u-${id}" readonly>${JSON.stringify(u, null, 2)}</textarea>
          <div class="actions">
            <button class="red" onclick="deleteUser('${id}')">Delete User</button>
            <button class="gray" onclick="toggle('u-${id}')">Close</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
}

function toggle(id) {
  document.getElementById('body-' + id).classList.toggle('open');
}

async function saveDeal(id) {
  try {
    const val = JSON.parse(document.getElementById('ta-' + id).value);
    const res = await fetch('/admin/deals/' + id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json','X-Admin-Password': pw()},
      body: JSON.stringify(val)
    });
    if (res.ok) { showStatus('Saved ' + id, true); load(); }
    else showStatus('Save failed', false);
  } catch(e) { showStatus('Invalid JSON: ' + e.message, false); }
}

async function deleteDeal(id) {
  if (!confirm('Delete deal ' + id + '? This cannot be undone.')) return;
  const res = await fetch('/admin/deals/' + id, {method:'DELETE', headers:{'X-Admin-Password': pw()}});
  if (res.ok) { showStatus('Deleted ' + id, true); load(); }
  else showStatus('Delete failed', false);
}

async function deleteUser(id) {
  if (!confirm('Delete user ' + id + '?')) return;
  const res = await fetch('/admin/users/' + id, {method:'DELETE', headers:{'X-Admin-Password': pw()}});
  if (res.ok) { showStatus('Deleted user', true); load(); }
  else showStatus('Delete failed', false);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
